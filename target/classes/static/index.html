<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetMap - Connect to Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-map-location-dot"></i> MeetMap
            </a>
            <div class="nav-links">
                <a href="#" class="btn btn-outline" id="navAdminBtn">Admin Panel</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper container">
        <div class="card auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin">Login</div>
                <div class="auth-tab" id="tabSignup">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email <span style="color:#ef4444;">*</span></label>
                    <input type="email" id="loginEmail" class="form-control" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password <span style="color:#ef4444;">*</span></label>
                    <input type="password" id="loginPassword" class="form-control" required placeholder="********">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                <div id="loginError" class="mt-3 text-center" style="color: #ef4444; display: none;"></div>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="hidden" novalidate>
                <div class="form-group">
                    <label for="signupName">Full Name <span style="color:#ef4444;">*</span></label>
                    <input type="text" id="signupName" class="form-control" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email <span style="color:#ef4444;">*</span></label>
                    <input type="email" id="signupEmail" class="form-control" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password <span style="color:#ef4444;">*</span></label>
                    <input type="password" id="signupPassword" class="form-control" required placeholder="********">
                </div>
                <div class="form-group">
                    <label for="signupCity">City (Location) <span style="color:#ef4444;">*</span></label>
                    <input type="text" id="signupCity" class="form-control" required placeholder="Your City">
                </div>
                <div class="form-group">
                    <label for="signupDob">Date of Birth <span style="color:#ef4444;">*</span></label>
                    <input type="date" id="signupDob" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="signupPhone">Phone Number</label>
                    <input type="tel" id="signupPhone" class="form-control" placeholder="+xxxxx xxxxx">
                </div>
                <div class="form-group">
                    <label for="signupAgeGroup">Age Group <span style="color:#ef4444;">*</span></label>
                    <select id="signupAgeGroup" class="form-control" required>
                        <option value="">Select Age Group</option>
                        <option value="Under 18">Under 18</option>
                        <option value="18-25">18-25</option>
                        <option value="26-35">26-35</option>
                        <option value="36-50">36-50</option>
                        <option value="51+">51+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Areas of Interest</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px;">
                        <label><input type="checkbox" name="interest" value="Creative"> Creative</label>
                        <label><input type="checkbox" name="interest" value="Sports"> Sports</label>
                        <label><input type="checkbox" name="interest" value="Tech"> Tech</label>
                        <label><input type="checkbox" name="interest" value="Local Event"> Local Event</label>
                        <label><input type="checkbox" name="interest" value="Exhibition"> Exhibition</label>
                        <label><input type="checkbox" name="interest" value="Gathering"> Gathering</label>
                    </div>
                </div>
                <p style="font-size: 0.8rem; color: #888; margin-bottom: 12px;"><span style="color:#ef4444;">*</span>
                    Required fields</p>
                <button type="submit" class="btn btn-accent" style="width: 100%;">Create Account</button>
                <div id="signupError" class="mt-3 text-center" style="color: #ef4444; display: none;"></div>
            </form>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div class="modal" id="adminModal">
        <div class="modal-content" style="max-width: 400px;">
            <button class="close-modal" id="closeAdminModal">&times;</button>
            <h2 class="mb-4">Admin Access</h2>
            <form id="adminLoginForm">
                <div class="form-group text-left">
                    <label for="adminEmail">Admin Email</label>
                    <input type="email" id="adminEmail" class="form-control" required value="admin@meetmap.com">
                </div>
                <div class="form-group text-left">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" class="form-control" required value="admin123">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login as Admin</button>
                <div id="adminError" class="mt-3 text-center" style="color: #ef4444; display: none;"></div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('user')) {
                window.location.href = 'dashboard.html';
            }
            if (localStorage.getItem('admin')) {
                window.location.href = 'admin.html';
            }

            const tabLogin = document.getElementById('tabLogin');
            const tabSignup = document.getElementById('tabSignup');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');

            tabLogin.addEventListener('click', () => {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            });

            tabSignup.addEventListener('click', () => {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            });

            // Login Logic
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const errorDiv = document.getElementById('loginError');

                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('user', JSON.stringify(data));
                        window.location.href = 'dashboard.html';
                    } else {
                        errorDiv.textContent = data.message || 'Login failed';
                        errorDiv.style.display = 'block';
                    }
                } catch (err) {
                    errorDiv.textContent = 'Network error';
                    errorDiv.style.display = 'block';
                }
            });

            // Signup Logic with mandatory field validation
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const errorDiv = document.getElementById('signupError');
                errorDiv.style.display = 'none';

                const name = document.getElementById('signupName').value.trim();
                const email = document.getElementById('signupEmail').value.trim();
                const password = document.getElementById('signupPassword').value;
                const city = document.getElementById('signupCity').value.trim();
                const dateOfBirth = document.getElementById('signupDob').value;
                const ageGroup = document.getElementById('signupAgeGroup').value;
                const phoneNumber = document.getElementById('signupPhone').value.trim();

                // Mandatory field validation
                const missingFields = [];
                if (!name) missingFields.push('Full Name');
                if (!email) missingFields.push('Email');
                if (!password) missingFields.push('Password');
                if (!city) missingFields.push('City');
                if (!dateOfBirth) missingFields.push('Date of Birth');
                if (!ageGroup) missingFields.push('Age Group');

                if (missingFields.length > 0) {
                    errorDiv.textContent = 'Please fill in the required fields: ' + missingFields.join(', ');
                    errorDiv.style.display = 'block';
                    return;
                }

                // Get checked interests
                const interestsCheckboxes = document.querySelectorAll('input[name="interest"]:checked');
                const areaOfInterest = Array.from(interestsCheckboxes).map(cb => cb.value).join(', ');

                try {
                    const res = await fetch('/api/auth/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password, city, dateOfBirth, phoneNumber, ageGroup, areaOfInterest })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        alert('Account created! Please log in.');
                        tabLogin.click();
                        document.getElementById('loginEmail').value = email;
                    } else {
                        errorDiv.textContent = data.message || 'Signup failed';
                        errorDiv.style.display = 'block';
                    }
                } catch (err) {
                    errorDiv.textContent = 'Network error';
                    errorDiv.style.display = 'block';
                }
            });

            // Admin Logic
            const adminModal = document.getElementById('adminModal');
            document.getElementById('navAdminBtn').addEventListener('click', (e) => {
                e.preventDefault();
                adminModal.classList.add('active');
            });
            document.getElementById('closeAdminModal').addEventListener('click', () => {
                adminModal.classList.remove('active');
            });

            document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('adminEmail').value;
                const password = document.getElementById('adminPassword').value;
                const errorDiv = document.getElementById('adminError');

                try {
                    const res = await fetch('/api/auth/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('admin', JSON.stringify(data));
                        window.location.href = 'admin.html';
                    } else {
                        errorDiv.textContent = data.message || 'Invalid admin credentials';
                        errorDiv.style.display = 'block';
                    }
                } catch (err) {
                    errorDiv.textContent = 'Network error';
                    errorDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>
