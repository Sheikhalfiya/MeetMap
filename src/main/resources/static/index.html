<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetMap - Connect to Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body style="background: url('https://plus.unsplash.com/premium_vector-1741548994291-c8c6e8e0cac7?q=80&w=1228&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed; background-size: cover; color: var(--text-main); font-family: 'Inter', sans-serif;">
    <nav class="navbar" style="background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px);">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-map-location-dot"></i> MeetMap
            </a>
            <div class="nav-links">
                <a href="#" class="btn btn-outline" id="navAdminBtn">Admin</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper container">
        <div class="card auth-container" style="background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin">Login</div>
                <div class="auth-tab" id="tabSignup">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-control" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-control" required placeholder="********">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                <div id="loginError" class="mt-3 text-center" style="color: #ef4444; display: none;"></div>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="hidden">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" class="form-control" required placeholder=" Doe">
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" class="form-control" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" class="form-control" required placeholder="********">
                </div>
                <div class="form-group">
                    <label for="signupCity">City (Location)</label>
                    <input type="text" id="signupCity" class="form-control" required placeholder="New York">
                </div>
                <div class="form-group">
                    <label for="signupDob">Date of Birth</label>
                    <input type="date" id="signupDob" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="signupPhone">Phone Number</label>
                    <input type="tel" id="signupPhone" class="form-control" required placeholder="+1234567890">
                </div>
                <div class="form-group">
                    <label for="signupAgeGroup">Age Group</label>
                    <select id="signupAgeGroup" class="form-control" required>
                        <option value="">Select Age Group</option>
                        <option value="Under 18">Under 18</option>
                        <option value="18-25">18-25</option>
                        <option value="26-35">26-35</option>
                        <option value="36-50">36-50</option>
                        <option value="51+">51+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Areas of Interest</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px;">
                        <label><input type="checkbox" name="interest" value="Creative"> Creative</label>
                        <label><input type="checkbox" name="interest" value="Sports"> Sports</label>
                        <label><input type="checkbox" name="interest" value="Tech"> Tech</label>
                        <label><input type="checkbox" name="interest" value="Local Event"> Local Event</label>
                        <label><input type="checkbox" name="interest" value="Exhibition"> Exhibition</label>
                        <label><input type="checkbox" name="interest" value="Gathering"> Gathering</label>
                        <label><input type="checkbox" name="interest" value="Custom" id="customInterestCbSignup"> Custom...</label>
                    </div>
                    <input type="text" id="customInterestInputSignup" class="form-control mt-2 hidden" placeholder="Enter custom interest" style="width: 100%;">
                </div>
                <button type="submit" class="btn btn-accent" style="width: 100%;">Create Account</button>
                <div id="signupError" class="mt-3 text-center" style="color: #ef4444; display: none;"></div>
            </form>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div class="modal" id="adminModal">
        <div class="modal-content" style="max-width: 400px;">
            <button class="close-modal" id="closeAdminModal">&times;</button>
            <h2 class="mb-4">Admin Access</h2>
            <form id="adminLoginForm">
                <div class="form-group text-left">
                    <label for="adminEmail">Admin Email</label>
                    <input type="email" id="adminEmail" class="form-control" required placeholder="admin@example.com">
                </div>
                <div class="form-group text-left">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" class="form-control" required placeholder="********">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login as Admin</button>
                <div id="adminError" class="mt-3 text-center" style="color: #ef4444; display: none;"></div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('user')) {
                window.location.href = 'dashboard.html';
            }
            if (localStorage.getItem('admin')) {
                window.location.href = 'admin.html';
            }

            const tabLogin = document.getElementById('tabLogin');
            const tabSignup = document.getElementById('tabSignup');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');

            tabLogin.addEventListener('click', () => {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            });

            tabSignup.addEventListener('click', () => {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            });

            // Handle Custom Area of Interest Toggle
            const customCbSignup = document.getElementById('customInterestCbSignup');
            const customInputSignup = document.getElementById('customInterestInputSignup');
            
            customCbSignup.addEventListener('change', () => {
                if(customCbSignup.checked) {
                    customInputSignup.classList.remove('hidden');
                    customInputSignup.setAttribute('required', 'true');
                } else {
                    customInputSignup.classList.add('hidden');
                    customInputSignup.removeAttribute('required');
                    customInputSignup.value = '';
                }
            });

            // Login Logic
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const errorDiv = document.getElementById('loginError');

                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('user', JSON.stringify(data));
                        window.location.href = 'dashboard.html';
                    } else {
                        errorDiv.textContent = data.message || 'Login failed';
                        errorDiv.style.display = 'block';
                    }
                } catch (err) {
                    errorDiv.textContent = 'Network error';
                    errorDiv.style.display = 'block';
                }
            });

            // Signup Logic
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('signupName').value;
                const email = document.getElementById('signupEmail').value;
                const password = document.getElementById('signupPassword').value;
                const city = document.getElementById('signupCity').value;
                const dateOfBirth = document.getElementById('signupDob').value;
                const phoneNumber = document.getElementById('signupPhone').value;
                const ageGroup = document.getElementById('signupAgeGroup').value;

                // Get checked interests
                const interestsCheckboxes = document.querySelectorAll('input[name="interest"]:checked');
                let areaOfInterestArr = Array.from(interestsCheckboxes).map(cb => cb.value);
                
                // Replace "Custom" with actual value
                if (customCbSignup.checked && customInputSignup.value.trim() !== '') {
                    areaOfInterestArr = areaOfInterestArr.filter(v => v !== 'Custom');
                    areaOfInterestArr.push(customInputSignup.value.trim());
                }
                const areaOfInterest = areaOfInterestArr.join(', ');
                const errorDiv = document.getElementById('signupError');

                try {
                    const res = await fetch('/api/auth/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password, city, dateOfBirth, phoneNumber, ageGroup, areaOfInterest })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        alert('Account created! Please log in.');
                        tabLogin.click();
                        document.getElementById('loginEmail').value = email;
                    } else {
                        errorDiv.textContent = data.message || 'Signup failed';
                        errorDiv.style.display = 'block';
                    }
                } catch (err) {
                    errorDiv.textContent = 'Network error';
                    errorDiv.style.display = 'block';
                }
            });

            // Admin Logic
            const adminModal = document.getElementById('adminModal');
            document.getElementById('navAdminBtn').addEventListener('click', (e) => {
                e.preventDefault();
                adminModal.classList.add('active');
            });
            document.getElementById('closeAdminModal').addEventListener('click', () => {
                adminModal.classList.remove('active');
            });

            document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('adminEmail').value;
                const password = document.getElementById('adminPassword').value;
                const errorDiv = document.getElementById('adminError');

                try {
                    const res = await fetch('/api/auth/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('admin', JSON.stringify(data));
                        window.location.href = 'admin.html';
                    } else {
                        errorDiv.textContent = data.message || 'Invalid admin credentials';
                        errorDiv.style.display = 'block';
                    }
                } catch (err) {
                    errorDiv.textContent = 'Network error';
                    errorDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>
